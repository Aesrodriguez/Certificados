services:
  - type: web
    name: clara-certificados
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && alembic upgrade head"
    startCommand: "gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 1 --bind 0.0.0.0:$PORT --timeout 60"
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.4"
    healthCheckPath: /healthz
