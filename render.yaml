services:
  - type: web
    name: clara-certificados
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
    healthCheckPath: /healthz
