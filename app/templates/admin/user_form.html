{% extends "base.html" %}
{% block title %}Nuevo usuario - Clara Certificados{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h4 mb-3">Nuevo usuario</h1>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/users">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="mb-3">
                <label class="form-label" for="full_name">Nombre completo</label>
                <input class="form-control" type="text" id="full_name" name="full_name" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="email">Correo</label>
                <input class="form-control" type="email" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Contraseña temporal</label>
                <input class="form-control" type="password" id="password" name="password" minlength="10" required>
                <div class="form-text">Mínimo 10 caracteres.</div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="role">Rol</label>
                <select class="form-select" id="role" name="role" required>
                    {% for r in roles %}
                    <option value="{{ r.value }}">{{ r.value }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Crear usuario</button>
        </form>
    </div>
</div>
{% endblock %}
