{% extends "base.html" %}
{% block title %}Iniciar sesión - Clara Certificados{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="h4 mb-3">Iniciar sesión</h1>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label" for="email">Correo</label>
                <input class="form-control" type="email" id="email" name="email" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Contraseña</label>
                <input class="form-control" type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <div class="mt-3 text-center">
            <a href="/forgot-password" class="text-decoration-none small text-muted">
                ¿Olvidaste tu contraseña?
            </a>
        </div>
    </div>
</div>
{% endblock %}
